<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Inkwell vessel body + neck -->
  <path
    d="M11 6 L21 6 L21 11 C23 11.5 25 13.5 25 16 L25 24.5 Q25 28 21 28 L11 28 Q7 28 7 24.5 L7 16 C7 13.5 9 11.5 11 11 Z"
    fill="#2b1f15"
  />
  <!-- Rim (depth effect) -->
  <ellipse cx="16" cy="6" rx="5" ry="2.2" fill="#1c1309"/>
  <!-- Terracotta ink surface -->
  <ellipse cx="16" cy="6" rx="3.4" ry="1.35" fill="#c25829"/>
  <!-- Ink shimmer highlight -->
  <ellipse cx="14.8" cy="5.6" rx="1" ry="0.45" fill="white" fill-opacity="0.35"/>
  <!-- Glass body highlight -->
  <path
    d="M9 14.5 C9 13.5 9.5 12.5 10.5 12 L10.5 25.5 C9.5 24.8 9 23.5 9 22 Z"
    fill="white" fill-opacity="0.08"
  />
  <!-- Quill tip dipping in (subtle) -->
  <path
    d="M21.5 2 C23.5 1 26 2 27 3.5 C25 4.5 22.5 5.5 21 6"
    stroke="#c25829" stroke-width="1.1" stroke-linecap="round" fill="none"
  />
  <path
    d="M27 3.5 L21 6"
    stroke="#c25829" stroke-width="0.6" stroke-linecap="round" fill="none" opacity="0.55"
  />
</svg>
